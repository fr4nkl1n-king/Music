<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music - Ultimate Version</title>
    <style>
        :root {
            --bg-black: #000000;
            --purple-nav: rgba(45, 12, 81, 0.95);
            --accent-pink: #ff0055;
            --selection-cyan: #00ffff;
            --card-gray: #1a1a1a;
            --light-panel: rgba(255, 255, 255, 0.08);
            --text-dim: #b3b3b3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-black);
            color: white;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: linear-gradient(180deg, var(--purple-nav) 0%, rgba(0,0,0,0) 100%);
            padding: 10px 0;
            backdrop-filter: blur(10px);
        }

        .nav-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 5%;
            gap: 10px;
        }

        .nav-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            width: 100%;
            max-width: 450px;
        }

        .search-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .nav-container { flex-direction: row; justify-content: space-between; }
            .search-box { margin: 0 20px; }
        }

        /* --- HERO --- */
        .hero {
            height: 60vh;
            background: linear-gradient(0deg, var(--bg-black) 10%, rgba(0,0,0,0) 100%),
                        url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5%;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0;
            font-weight: 900;
            line-height: 0.9;
        }

        .pink-btn {
            background: var(--accent-pink);
            border: none;
            padding: 15px 30px;
            border-radius: 35px;
            color: white;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            width: fit-content;
            text-transform: uppercase;
            transition: transform 0.2s;
        }
        .pink-btn:hover { transform: scale(1.05); }

        /* --- CONTENIDO --- */
        .main-content { padding: 0 5%; margin-top: -40px; }

        .upload-section {
            background: var(--light-panel);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* --- GRID DE CARTAS --- */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-gray);
            border-radius: 12px;
            padding: 15px;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .card.selected {
            border-color: var(--selection-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; }
        .card-info { margin-top: 10px; font-weight: bold; font-size: 0.9rem; }

        /* --- TOP ARTISTAS (1-10) --- */
        .top-artists-section { margin: 60px 0; }
        .top-artists-title {
            color: #ffcc00;
            text-align: center;
            font-weight: bold;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .top-artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        .top-artist-item {
            display: flex;
            align-items: center;
            position: relative;
        }

        .top-artist-number {
            font-size: 6rem;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px #444;
            margin-right: -30px;
            z-index: 1;
            line-height: 1;
        }

        .top-artist-img-wrapper {
            width: 150px;
            height: 150px;
            background: var(--card-gray);
            border-radius: 10px;
            overflow: hidden;
            z-index: 2;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
        }

        .top-artist-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* --- PLAYER BAR --- */
        .spotify-player {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 2000;
        }

        .player-info { display: flex; align-items: center; gap: 15px; }
        .player-info img { width: 60px; border-radius: 4px; }
        .player-controls { display: flex; flex-direction: column; align-items: center; flex-grow: 1; }
        .player-play { font-size: 2rem; cursor: pointer; color: var(--selection-cyan); }
        
        audio { height: 30px; width: 80%; max-width: 500px; filter: invert(100%); }

    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="nav-top">
                <div style="font-weight: 900; font-size: 1.5rem; letter-spacing: -1px;"> VIP</div>
                <div style="font-size: 0.8rem; font-weight: bold; cursor: pointer;">MENÚ</div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="¿Qué quieres escuchar hoy?">
            </div>
        </div>
    </header>

    <section class="hero">
        <div style="font-size: 0.8rem; font-weight: bold; color: var(--selection-cyan); margin-bottom: 10px;">PROYECTO EXCLUSIVO</div>
        <h1>Music</h1>
        <button class="pink-btn">EXPLORAR GALAXY</button>
    </section>

    <div class="main-content">
        
        <!-- SECCIÓN DE SUBIDA -->
        <div class="upload-section">
            <h3 style="margin:0;">TU MÚSICA LOCAL</h3>
            <input type="file" id="uploadMusic" accept="audio/*" hidden>
            <button id="btnUpload" class="pink-btn" style="margin-top:0;">⬆️ SUBIR CANCIÓN</button>
            <div id="songList" style="width: 100%; text-align: center; color: var(--text-dim);"></div>
        </div>

        <!-- GRID PRINCIPAL -->
        <div class="main-grid">
            <div class="card selected">
                <img src="https://i.scdn.co/image/ab67616d0000b27370399852f676449179d72a4d" alt="Mix">
                <div class="card-info">Noiseferatu Mix</div>
            </div>
            <div class="card">
                <img src="https://i.scdn.co/image/ab67616d0000b27341e3195663745679549f0322" alt="Milo">
                <div class="card-info">Milo J - 111</div>
            </div>
            <div class="card">
                <img src="https://i.scdn.co/image/ab67616d0000b273e0e98031d683713f8c857700" alt="Rock">
                <div class="card-info">Rock Essentials</div>
            </div>
            <div class="card">
                <img src="https://i.scdn.co/image/ab67616d0000b273063f910408546b4122d20f91" alt="Trap">
                <div class="card-info">Trap Argentino</div>
            </div>
        </div>

        <!-- TOP ARTISTAS (1 al 10) -->
        <div class="top-artists-section">
            <div class="top-artists-title">🏆 TOP 10 ARTISTAS DEL MES</div>
            <div class="top-artists-grid" id="topGrid">
                <!-- Se genera con el bucle o manualmente -->
                <!-- Ejemplo manual para asegurar el estilo de ambos códigos -->
                <div class="top-artist-item"><span class="top-artist-number">1</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5eb70399852f676449179d72a4d"></div></div>
                <div class="top-artist-item"><span class="top-artist-number">2</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5eb41e3195663745679549f0322"></div></div>
                <div class="top-artist-item"><span class="top-artist-number">3</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5ebe0e98031d683713f8c857700"></div></div>
                <div class="top-artist-item"><span class="top-artist-number">4</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5eb063f910408546b4122d20f91"></div></div>
                <div class="top-artist-item"><span class="top-artist-number">5</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5eb70399852f676449179d72a4d"></div></div>
                <div class="top-artist-item"><span class="top-artist-number">6</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5eb41e3195663745679549f0322"></div></div>
                <div class="top-artist-item"><span class="top-artist-number">7</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5ebe0e98031d683713f8c857700"></div></div>
                <div class="top-artist-item"><span class="top-artist-number">8</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5eb063f910408546b4122d20f91"></div></div>
                <div class="top-artist-item"><span class="top-artist-number">9</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5eb70399852f676449179d72a4d"></div></div>
                <div class="top-artist-item"><span class="top-artist-number">10</span><div class="top-artist-img-wrapper"><img src="https://i.scdn.co/image/ab6761610000e5eb41e3195663745679549f0322"></div></div>
            </div>
        </div>
    </div>

    <!-- PLAYER BAR -->
    <div class="spotify-player">
        <div class="player-info">
            <img src="https://i.scdn.co/image/ab67616d0000b27370399852f676449179d72a4d" id="playerImg">
            <div>
                <div id="playerTitle" style="font-weight:bold;">Luces Neón</div>
                <div id="playerArtist" style="font-size:0.8rem; color:var(--text-dim);">Noiseferatu</div>
            </div>
        </div>
        
        <div class="player-controls">
            <audio id="audioPlayer"></audio>
            <div class="player-play" id="masterPlay">▶️</div>
        </div>
    </div>

    <script>
        const uploadBtn = document.getElementById('btnUpload');
        const fileInput = document.getElementById('uploadMusic');
        const audioPlayer = document.getElementById('audioPlayer');
        const masterPlay = document.getElementById('masterPlay');
        const songList = document.getElementById('songList');

        // Manejo de archivos
        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audioPlayer.src = url;
                songList.textContent = "Reproduciendo ahora: " + file.name;
                document.getElementById('playerTitle').textContent = file.name;
                document.getElementById('playerArtist').textContent = "Archivo Local";
                audioPlayer.play();
                masterPlay.textContent = "⏸️";
            }
        });

        // Control Play/Pause
        masterPlay.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                masterPlay.textContent = "⏸️";
            } else {
                audioPlayer.pause();
                masterPlay.textContent = "▶️";
            }
        });
    </script>
</body>
</html>
